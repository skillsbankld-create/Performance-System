  if(btnAddMonitoring) btnAddMonitoring.onclick = ()=>{ ui.showAddMonitoring=!ui.showAddMonitoring; ui.editingMonitoring=null; render(); };
  const btnCancelMonitoring = document.getElementById('btn-cancel-monitoring');
  if(btnCancelMonitoring) btnCancelMonitoring.onclick = ()=>{ ui.showAddMonitoring=false; ui.editingMonitoring=null; render(); };
  document.querySelectorAll('[data-edit-monitoring]').forEach(b=>{
    b.onclick = ()=>{ ui.editingMonitoring=b.dataset.editMonitoring; ui.showAddMonitoring=false; render(); };
  });
  document.querySelectorAll('[data-delete-monitoring]').forEach(b=>{
    b.onclick = async ()=>{
      const m = state.monitoringLogs.find(x=>x.id===b.dataset.deleteMonitoring);
      if(!m) return;
      if(!confirm(`Delete this monitoring log entry for "${m.program}"? This cannot be undone.`)) return;
      state.monitoringLogs = state.monitoringLogs.filter(x=>x.id!==m.id);
      logActivity(`Deleted monitoring log entry for ${employeeById(m.employeeId)?.name||'—'} — "${m.program}"`);
      await saveData();
      showToast('Monitoring entry deleted'); render();
    };
  });
  const btnSaveMonitoring = document.getElementById('btn-save-monitoring');
  if(btnSaveMonitoring) btnSaveMonitoring.onclick = async ()=>{
    const employeeId = document.getElementById('mo-emp').value;
    const program = document.getElementById('mo-program').value.trim();
    const date = document.getElementById('mo-date').value || todayStr();
    const hours = Number(document.getElementById('mo-hours').value)||0;
    const notes = document.getElementById('mo-notes').value.trim();
    if(!program){ showToast('Please enter the program / topic name'); return; }
    if(hours<=0){ showToast('Please enter hours greater than 0'); return; }
    if(ui.editingMonitoring){
      const m = state.monitoringLogs.find(x=>x.id===ui.editingMonitoring);
      if(m){ Object.assign(m, {employeeId, program, date, hours, notes}); }
      logActivity(`Edited monitoring log entry for ${employeeById(employeeId)?.name||'—'} — "${program}"`);
      await saveData();
      ui.editingMonitoring=null; showToast('Monitoring entry updated'); render();
      return;
    }
    state.monitoringLogs.push({id:uid('mo'), employeeId, program, date, hours, notes});
    logActivity(`Logged ${hours}h of training monitoring for ${employeeById(employeeId)?.name||'—'} — "${program}"`);
    await saveData();
    ui.showAddMonitoring=false; showToast('Monitoring hours logged'); render();
  };

  // client satisfaction
  const btnAddSatisfaction = document.getElementById('btn-add-satisfaction');
  if(btnAddSatisfaction) btnAddSatisfaction.onclick = ()=>{ ui.showAddSatisfaction=!ui.showAddSatisfaction; ui.editingSatisfaction=null; render(); };
  const btnCancelSatisfaction = document.getElementById('btn-cancel-satisfaction');
  if(btnCancelSatisfaction) btnCancelSatisfaction.onclick = ()=>{ ui.showAddSatisfaction=false; ui.editingSatisfaction=null; render(); };
  document.querySelectorAll('[data-edit-satisfaction]').forEach(b=>{
    b.onclick = ()=>{ ui.editingSatisfaction=b.dataset.editSatisfaction; ui.showAddSatisfaction=false; render(); };
  });
  document.querySelectorAll('[data-delete-satisfaction]').forEach(b=>{
    b.onclick = async ()=>{
      const c = state.clientSatisfaction.find(x=>x.id===b.dataset.deleteSatisfaction);
      if(!c) return;
      if(!confirm(`Delete this satisfaction score for ${c.client}? This cannot be undone.`)) return;
      state.clientSatisfaction = state.clientSatisfaction.filter(x=>x.id!==c.id);
      logActivity(`Deleted client satisfaction entry for ${c.client}`);
      await saveData();
      showToast('Satisfaction entry deleted'); render();
    };
  });
  const btnSaveSatisfaction = document.getElementById('btn-save-satisfaction');
  if(btnSaveSatisfaction) btnSaveSatisfaction.onclick = async ()=>{
    const employeeId = document.getElementById('cs-emp').value;
    const client = document.getElementById('cs-client').value.trim();
    const program = document.getElementById('cs-program').value.trim();
    const date = document.getElementById('cs-date').value || todayStr();
    const score = Number(document.getElementById('cs-score').value);
    const note = document.getElementById('cs-note').value.trim();
    if(!client){ showToast('Please enter the client name'); return; }
    if(ui.editingSatisfaction){
      const c = state.clientSatisfaction.find(x=>x.id===ui.editingSatisfaction);
      if(c){ Object.assign(c, {employeeId, client, program, date, score, note}); }
      logActivity(`Edited client satisfaction entry for ${employeeById(employeeId)?.name||'—'} — ${client} — ${score}/5`);
      await saveData();
      ui.editingSatisfaction=null; showToast('Satisfaction entry updated'); render();
      return;
    }
    state.clientSatisfaction.push({id:uid('cs'), employeeId, client, program, date, score, note});
    logActivity(`Logged client satisfaction for ${employeeById(employeeId)?.name||'—'} — ${client} — ${score}/5`);
    await saveData();
    ui.showAddSatisfaction=false; showToast('Satisfaction score logged'); render();
  };

  // attendance — unauthorized late/early-leave hours
  const btnAddAttendance = document.getElementById('btn-add-attendance');
  if(btnAddAttendance) btnAddAttendance.onclick = ()=>{ ui.showAddAttendance=!ui.showAddAttendance; ui.editingAttendance=null; render(); };
  const btnCancelAttendance = document.getElementById('btn-cancel-attendance');
  if(btnCancelAttendance) btnCancelAttendance.onclick = ()=>{ ui.showAddAttendance=false; ui.editingAttendance=null; render(); };
  document.querySelectorAll('[data-edit-attendance]').forEach(b=>{
    b.onclick = ()=>{ ui.editingAttendance=b.dataset.editAttendance; ui.showAddAttendance=false; render(); };
  });
  document.querySelectorAll('[data-delete-attendance]').forEach(b=>{
    b.onclick = async ()=>{
      const a = state.attendanceLogs.find(x=>x.id===b.dataset.deleteAttendance);
      if(!a) return;
      if(!confirm(`Delete this attendance entry for ${employeeById(a.employeeId)?.name||'—'} (${monthLabelFromKey(a.month)})? This cannot be undone.`)) return;
      state.attendanceLogs = state.attendanceLogs.filter(x=>x.id!==a.id);
      logActivity(`Deleted attendance log entry for ${employeeById(a.employeeId)?.name||'—'} — ${monthLabelFromKey(a.month)}`);
      await saveData();
      showToast('Attendance entry deleted'); render();
    };
  });
  const btnSaveAttendance = document.getElementById('btn-save-attendance');
  if(btnSaveAttendance) btnSaveAttendance.onclick = async ()=>{
    const employeeId = document.getElementById('at-emp').value;
    const month = document.getElementById('at-month').value;
    const hours = Number(document.getElementById('at-hours').value)||0;
    const note = document.getElementById('at-note').value.trim();
    if(hours<=0){ showToast('Please enter hours greater than 0'); return; }
    if(ui.editingAttendance){
      const a = state.attendanceLogs.find(x=>x.id===ui.editingAttendance);
      if(a){ Object.assign(a, {employeeId, month, hours, note}); }
      logActivity(`Edited attendance log entry for ${employeeById(employeeId)?.name||'—'} — ${monthLabelFromKey(month)} — ${hours}h`);
      await saveData();
      ui.editingAttendance=null; showToast('Attendance entry updated'); render();
      return;
    }
    state.attendanceLogs.push({id:uid('at'), employeeId, month, hours, note});
    logActivity(`Logged ${hours}h of unauthorized late/early-leave for ${employeeById(employeeId)?.name||'—'} — ${monthLabelFromKey(month)}`);
    await saveData();
    ui.showAddAttendance=false; showToast('Attendance hours logged'); render();
  };

  // employee of the month
  const btnOpenEomPicker = document.getElementById('btn-open-eom-picker');
  if(btnOpenEomPicker) btnOpenEomPicker.onclick = ()=>{ ui.showEomPicker=true; render(); };
  const btnReopenEom = document.getElementById('btn-reopen-eom');
  if(btnReopenEom) btnReopenEom.onclick = ()=>{ ui.showEomPicker=true; render(); };
  const btnCancelEom = document.getElementById('btn-cancel-eom');
  if(btnCancelEom) btnCancelEom.onclick = ()=>{ ui.showEomPicker=false; render(); };
  const btnConfirmEom = document.getElementById('btn-confirm-eom');
  if(btnConfirmEom) btnConfirmEom.onclick = async ()=>{
    const employeeId = document.getElementById('eom-emp').value;
    const note = document.getElementById('eom-note').value.trim();
    const mKey = monthKey(todayStr());
    state.employeeOfMonth = state.employeeOfMonth.filter(x=>x.monthKey!==mKey);
    state.employeeOfMonth.push({id:uid('eom'), monthKey:mKey, employeeId, note, awardedAt:new Date().toISOString()});
    logActivity(`Announced ${employeeById(employeeId)?.name||'—'} as Employee of the Month for ${monthLabelFromKey(mKey)}`);
    await saveData();
    ui.showEomPicker=false; showToast('Employee of the Month announced 🏆'); render();
  };

  // team shoutouts
  const btnAddShoutout = document.getElementById('btn-add-shoutout');
  if(btnAddShoutout) btnAddShoutout.onclick = ()=>{ ui.showAddShoutout=!ui.showAddShoutout; render(); };
  const btnCancelShoutout = document.getElementById('btn-cancel-shoutout');
  if(btnCancelShoutout) btnCancelShoutout.onclick = ()=>{ ui.showAddShoutout=false; render(); };
  const btnSendShoutout = document.getElementById('btn-send-shoutout');
  if(btnSendShoutout) btnSendShoutout.onclick = async ()=>{
    const toEmployeeId = document.getElementById('so-to').value;
    const message = document.getElementById('so-message').value.trim();
    if(!message){ showToast('Please write the reason for this high five'); return; }
    const fromId = session.role==='employee'? session.employeeId : session.role;
    const mKey = monthKey(todayStr());
    const alreadySent = state.shoutouts.some(s=>s.fromId===fromId && monthKey(s.date)===mKey);
    if(alreadySent){ showToast('You can only send one High Five per month — see you next month!'); return; }
    const fromLabel = currentDisplayName();
    state.shoutouts.push({id:uid('so'), fromId, fromLabel, toEmployeeId, message, date:todayStr()});
    logActivity(`${fromLabel} gave a high five to ${employeeById(toEmployeeId)?.name||'—'}`);
    await saveData();
    ui.showAddShoutout=false; showToast('High five sent 🙌'); render();
  };

  // weekly prep — commitments
  const btnAddCommitment = document.getElementById('btn-add-commitment');
  if(btnAddCommitment) btnAddCommitment.onclick = ()=>{ ui.showAddCommitment=!ui.showAddCommitment; render(); };
  const btnCancelCommitment = document.getElementById('btn-cancel-commitment');
  if(btnCancelCommitment) btnCancelCommitment.onclick = ()=>{ ui.showAddCommitment=false; render(); };
  const btnSaveCommitment = document.getElementById('btn-save-commitment');
  if(btnSaveCommitment) btnSaveCommitment.onclick = async ()=>{
    const employeeId = document.getElementById('cm-emp').value;
    const text = document.getElementById('cm-text').value.trim();
    if(!text){ showToast('Please enter the commitment'); return; }
    const weekStart = getWeekStart(todayStr());
    state.commitments.push({id:uid('cm'), weekStart, employeeId, text, done:false});
    await saveData();
    ui.showAddCommitment=false; showToast('Commitment added'); render();
  };
  document.querySelectorAll('[data-toggle-commitment]').forEach(cb=>{
    cb.onchange = async ()=>{
      const c = state.commitments.find(x=>x.id===cb.dataset.toggleCommitment);
      if(c){ c.done = cb.checked; await saveData(); render(); }
    };
  });

  // settings page
  const btnMigrateAuth = document.getElementById('btn-migrate-auth');
  if(btnMigrateAuth) btnMigrateAuth.onclick = migrateToSecureLogin;
  const btnSaveAccounts = document.getElementById('btn-save-accounts');
  if(btnSaveAccounts) btnSaveAccounts.onclick = async ()=>{
    const adn = document.getElementById('set-admin-displayname').value.trim();
    const au = document.getElementById('set-admin-username').value.trim();
    const ap = document.getElementById('set-admin-password').value.trim();
    const tdn = document.getElementById('set-teamlead-displayname').value.trim();
    const tu = document.getElementById('set-teamlead-username').value.trim();
    const tp = document.getElementById('set-teamlead-password').value.trim();
    if(!au || !ap || !tu || !tp){ showToast('Usernames and passwords cannot be empty'); return; }
    if(au===tu){ showToast('Admin and Team Lead usernames must be different'); return; }
    state.accounts = {admin:{username:au,password:ap,displayName:adn||'Admin'}, teamlead:{username:tu,password:tp,displayName:tdn||'Team Lead'}};
    logActivity('Updated Admin/Team Lead account credentials');
    await saveData();
    showToast('Accounts updated');
  };
  document.querySelectorAll('[data-save-emp-account]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.saveEmpAccount;
      const e = employeeById(id);
      const username = document.getElementById('emp-username-'+id).value.trim();
      const password = document.getElementById('emp-password-'+id).value.trim();
      if(!username || !password){ showToast('Username and password cannot be empty'); return; }
      const taken = username===state.accounts.admin.username || username===state.accounts.teamlead.username ||
        state.employees.some(x=>x.id!==id && x.username===username);
      if(taken){ showToast('That username is already taken'); return; }
      if(state.authMigrated){
        alert(`Secure login is active, so passwords can't be reset from here for an existing account. In the Supabase dashboard, go to Authentication > Users, find ${authEmailFor(e.username||username)}, and use "Send password recovery" or set a new password there directly.`);
        return;
      }
      if(e){ e.username=username; e.password=password; logActivity(`Updated sign-in credentials for ${e.name}`); await saveData(); showToast(`${e.name}'s account updated`); }
    };
  });
  const btnResetData = document.getElementById('btn-reset-data');
  if(btnResetData) btnResetData.onclick = async ()=>{
    if(!confirm('This will permanently clear all tasks, reviews, audits, deliveries, check-ins, 1:1s and commitments for everyone. Team members are kept. Continue?')) return;
    state.tasks=[]; state.qualityReviews=[]; state.complianceAudits=[]; state.checkins=[]; state.commitments=[]; state.deliveries=[]; state.oneOnOnes=[];
    logActivity('Reset all operational data');
    await saveData();
    showToast('Operational data reset'); render();
  };

  // data export
  const btnExportJson = document.getElementById('btn-export-json');
  if(btnExportJson) btnExportJson.onclick = exportFullBackup;
  const btnExportTasksCsv = document.getElementById('btn-export-tasks-csv');
  if(btnExportTasksCsv) btnExportTasksCsv.onclick = exportTasksCSV;
  const btnExportReviewsCsv = document.getElementById('btn-export-reviews-csv');
  if(btnExportReviewsCsv) btnExportReviewsCsv.onclick = exportReviewsCSV;
  const btnExportAuditsCsv = document.getElementById('btn-export-audits-csv');
  if(btnExportAuditsCsv) btnExportAuditsCsv.onclick = exportAuditsCSV;

  // reports filters
  const rfEmp = document.getElementById('rf-emp');
  if(rfEmp) rfEmp.onchange = ()=>{ ui.reportFilterEmp = rfEmp.value; render(); };
  const rfType = document.getElementById('rf-type');
  if(rfType) rfType.onchange = ()=>{ ui.reportFilterType = rfType.value; render(); };
  const rfStatus = document.getElementById('rf-status');
  if(rfStatus) rfStatus.onchange = ()=>{ ui.reportFilterStatus = rfStatus.value; render(); };
}

function isFormOpen(){
  const active = document.activeElement;
  if(active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)) return true;
  return !!(ui.showAddEmployee||ui.showAddTask||ui.completingTask||ui.showAddReview||ui.showAddAudit||ui.showAddCheckin||ui.showAddCommitment||ui.showAddDelivery||ui.showAddOneOnOne||ui.showPickTask||ui.showAddRequest||ui.approvingTask||ui.editingTask);
}
async function applyRemoteUpdate(){
  if(!session) return;
  await loadData();
  render();
}
function checkAndApplyRemoteUpdate(){
  if(isFormOpen()){ setTimeout(checkAndApplyRemoteUpdate, 4000); return; }
  applyRemoteUpdate();
}
function subscribeRealtime(){
  try{
    sbClient.channel('app_state_changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'app_state', filter:'id=eq.main'}, ()=>{
        if(Date.now() - lastSaveAt < 3000) return; // this is almost certainly the echo of our own save — we already have the freshest data
        if(isFormOpen()){ showToast('Data updated elsewhere — will refresh shortly'); setTimeout(checkAndApplyRemoteUpdate, 4000); return; }
        setTimeout(applyRemoteUpdate, 400); // small settling delay so the read reliably sees the just-committed write
      })
      .subscribe();
  }catch(e){ console.error('Realtime subscribe failed:', e); }
}

(async function init(){
  if(!sbClient){
    document.getElementById('root').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
        <div style="max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;text-align:center">
          <h1 style="font-size:17px;margin:0 0 10px">${supabaseInitError? 'Could not connect to Supabase' : 'Almost there — connect Supabase'}</h1>
          <p style="color:var(--text-dim);font-size:13.5px;line-height:1.7;margin:0">
            ${supabaseInitError? escapeHtml(supabaseInitError) : `
              This copy of the system isn't connected to a database yet.
              Open the HTML file, find <code style="background:var(--surface-2);padding:2px 6px;border-radius:5px">SUPABASE_URL</code> and
              <code style="background:var(--surface-2);padding:2px 6px;border-radius:5px">SUPABASE_ANON_KEY</code> near the top of the script,
              and fill them in with your Supabase project's values.
            `}
          </p>
        </div>
      </div>`;
    return;
  }
  try{
    await loadSession();
    try{ await sbClient.auth.getSession(); }catch(e){}
    await loadData();
    renderApp();
    subscribeRealtime();
  }catch(e){
    console.error('Startup error:', e);
    document.getElementById('root').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
        <div style="max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;text-align:center">
          <h1 style="font-size:17px;margin:0 0 10px">Something went wrong on startup</h1>
          <p style="color:var(--text-dim);font-size:13.5px;line-height:1.7;margin:0">${escapeHtml(e.message||String(e))}</p>
        </div>
      </div>`;
  }
})();
</script>
