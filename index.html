<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L&amp;D Pulse — Skills Bank</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* brand palette */
    --bg:#080828;
    --surface:#0E1038;
    --surface-2:#151848;
    --surface-3:#1D2158;
    --border:#2B2F6B;
    --text:#EBF4FF;
    --text-dim:#9AA3D6;
    --text-faint:#666EA0;
    --teal:#40BDA9;
    --teal-dim:rgba(64,189,169,.16);
    --amber:#FFBC3A;
    --amber-dim:rgba(255,188,58,.16);
    --rose:#F26A44;
    --rose-dim:rgba(242,106,68,.16);
    --indigo:#4D88E8;
    --indigo-dim:rgba(77,136,232,.18);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 550px at 85% -10%, rgba(77,136,232,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(64,189,169,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  ::selection{background:var(--indigo-dim);}
  a{color:inherit;}
  button{font-family:inherit;}
  input,select{font-family:inherit;}

  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:250px;flex:0 0 250px;
    background:linear-gradient(180deg, var(--surface), rgba(18,27,46,.7));
    border-right:1px solid var(--border);
    padding:22px 18px;display:flex;flex-direction:column;gap:26px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;flex-direction:column;gap:8px;padding:0 4px;}
  .brand-logo{width:100%;max-width:190px;height:auto;display:block;}
  .brand .sub{font-size:11.5px;color:var(--text-faint);}

  nav.nav{display:flex;flex-direction:column;gap:4px;}
  .nav button{
    all:unset;cursor:pointer;display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:10px;color:var(--text-dim);font-size:14.5px;font-weight:500;
    transition:.15s;
  }
  .nav button:hover{background:var(--surface-2);color:var(--text);}
  .nav button.active{background:var(--indigo-dim);color:#C8CEFF;font-weight:700;}
  .nav button .ic{width:17px;text-align:center;opacity:.85;font-size:14px;}

  .sidebar-foot{margin-top:auto;font-size:11px;color:var(--text-faint);padding:0 4px;line-height:1.7;}

  main{flex:1;padding:30px 34px 60px;max-width:1320px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .page-head h1{font-size:23px;margin:0 0 4px;font-weight:800;}
  .page-head p{margin:0;color:var(--text-dim);font-size:13.5px;}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px;}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px;position:relative;overflow:hidden;}
  .kpi .lbl{font-size:12px;color:var(--text-dim);margin-bottom:8px;}
  .kpi .val{font-family:'Cairo',sans-serif;font-size:25px;font-weight:800;}
  .kpi .val small{font-size:13px;color:var(--text-dim);font-weight:500;margin-left:3px;}
  .kpi.teal{border-color:rgba(64,189,169,.35);}
  .kpi.teal .val{color:var(--teal);}
  .kpi.rose .val{color:var(--rose);}
  .kpi.amber .val{color:var(--amber);}
  .kpi.indigo{border-color:rgba(77,136,232,.35);}
  .kpi.indigo .val{color:var(--indigo);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;position:relative;overflow:hidden;}
  .card h3{margin:0 0 3px;font-size:15.5px;font-weight:700;}
  .card .hint{font-size:12.5px;color:var(--text-dim);margin:0 0 16px;}
  .card.accent-indigo{border-top:3px solid var(--indigo);}
  .card.accent-teal{border-top:3px solid var(--teal);}
  .card.accent-amber{border-top:3px solid var(--amber);}
  .card.accent-rose{border-top:3px solid var(--rose);}
  .card.accent-indigo::before,.card.accent-teal::before,.card.accent-amber::before,.card.accent-rose::before{
    content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle, currentColor, transparent 70%);opacity:.06;pointer-events:none;
  }
  .card.accent-indigo::before{color:var(--indigo);}
  .card.accent-teal::before{color:var(--teal);}
  .card.accent-amber::before{color:var(--amber);}
  .card.accent-rose::before{color:var(--rose);}

  .pulse-wrap{position:relative;background:linear-gradient(180deg, var(--surface), var(--surface-2));border:1px solid var(--border);border-radius:var(--radius);padding:22px 22px 16px;margin-bottom:22px;overflow:hidden;}
  .pulse-wrap .pulse-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .pulse-wrap .pulse-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;}
  .pulse-wrap .pulse-title .live{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:blip 1.6s infinite;}
  @keyframes blip{0%,100%{opacity:1;}50%{opacity:.25;}}
  .pulse-status{font-size:12.5px;color:var(--text-dim);}
  .pulse-bars{display:flex;align-items:flex-end;gap:3px;height:70px;position:relative;}
  .pulse-bar{flex:1;min-width:3px;border-radius:3px 3px 0 0;background:var(--surface-3);transition:.3s;}
  .pulse-sweep{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);width:40%;animation:sweep 3.2s linear infinite;}
  @keyframes sweep{0%{transform:translateX(-120%);}100%{transform:translateX(320%);}}
  .pulse-empty{color:var(--text-faint);font-size:13px;padding:14px 2px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--text-dim);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;padding:9px 10px;border-bottom:1px solid var(--border);}
  td{padding:11px 10px;border-bottom:1px solid rgba(37,48,83,.6);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.rowlink{cursor:pointer;transition:.12s;}
  tr.rowlink:hover{background:var(--surface-2);}
  .rank{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;background:var(--surface-3);font-weight:700;font-size:12px;color:var(--text-dim);}
  .rank.gold{background:linear-gradient(135deg,#F5C453,#C9862B);color:#2a1a02;}
  .rank.silver{background:linear-gradient(135deg,#D9E1EE,#9AA7C0);color:#1a2233;}
  .rank.bronze{background:linear-gradient(135deg,#E3A06B,#A15C2E);color:#2a1503;}
  .who{display:flex;align-items:center;gap:9px;}
  .avatar{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;font-family:'Cairo',sans-serif;flex:0 0 30px;overflow:hidden;}
  .who .nm{font-weight:600;}
  .who .rl{font-size:11.5px;color:var(--text-faint);}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;}
  .badge.pos{background:var(--teal-dim);color:var(--teal);}
  .badge.neg{background:var(--rose-dim);color:var(--rose);}
  .badge.zero{background:var(--surface-3);color:var(--text-dim);}
  .tag{display:inline-block;padding:3px 9px;border-radius:7px;background:var(--surface-3);color:var(--text-dim);font-size:11.5px;}
  .status-pill{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;}
  .status-pill.open{background:var(--amber-dim);color:var(--amber);}
  .status-pill.done{background:var(--teal-dim);color:var(--teal);}
  .status-pill.overdue{background:var(--rose-dim);color:var(--rose);}
  .status-pill.pending{background:var(--indigo-dim);color:var(--indigo);}

  .bar-row{display:grid;grid-template-columns:150px 1fr 60px;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;}
  .bar-track{height:9px;background:var(--surface-3);border-radius:6px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:6px;}

  .btn{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:700;transition:.15s;}
  .btn-primary{background:var(--indigo);color:#fff;}
  .btn-primary:hover{background:#3f78d9;}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--surface-3);}
  .btn-danger{background:var(--rose-dim);color:var(--rose);}
  .btn-danger:hover{background:rgba(242,106,68,.28);}
  .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:7px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;align-items:end;}
  label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  input[type=text],input[type=number],input[type=date],input[type=password],select,textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 11px;border-radius:9px;font-size:13.5px;outline:none;transition:.15s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-dim);}
  .form-actions{display:flex;gap:8px;margin-top:14px;}

  .empty-state{padding:34px 20px;text-align:center;color:var(--text-dim);}
  .empty-state .big{font-size:30px;margin-bottom:8px;}
  .empty-state .t{font-weight:700;color:var(--text);margin-bottom:4px;font-family:'Cairo',sans-serif;}
  .empty-state .d{font-size:13px;margin-bottom:14px;}

  .inline-form{background:var(--surface-2);border:1px dashed var(--border);border-radius:10px;padding:12px;margin-top:8px;display:flex;gap:10px;align-items:end;flex-wrap:wrap;}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters select{width:auto;min-width:150px;}

  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;}
  @media(max-width:980px){.grid-2{grid-template-columns:1fr;}}

  .profile-head{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
  .profile-head .avatar{width:64px;height:64px;border-radius:16px;font-size:22px;flex:0 0 64px;}
  .profile-head h2{margin:0 0 3px;font-size:20px;}
  .profile-head .role{color:var(--text-dim);font-size:13px;}
  .photo-btn{margin-top:6px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;cursor:pointer;margin-bottom:14px;}
  .back-link:hover{color:var(--text);}

  .stat-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px;}
  .stat-mini .box{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 13px;}
  .stat-mini .box .l{font-size:11px;color:var(--text-faint);margin-bottom:4px;}
  .stat-mini .box .v{font-family:'Cairo',sans-serif;font-weight:800;font-size:18px;}

  .weight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .weight-grid .wlabel{font-size:11.5px;color:var(--text-dim);margin-bottom:5px;}
  .weight-grid .wsub{font-size:10.5px;color:var(--text-faint);}

  @media(max-width:820px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;flex:none;height:auto;max-height:none;position:relative;flex-direction:row;align-items:center;overflow-x:auto;overflow-y:visible;padding:12px 14px;border-right:none;border-bottom:1px solid var(--border);gap:14px;}
    .brand{flex-direction:row;align-items:center;gap:10px;flex:0 0 auto;}
    .brand-logo{max-width:120px;}
    .brand .sub{display:none;}
    .brand-title{display:none;}
    nav.nav{flex-direction:row;gap:6px;flex:0 0 auto;}
    .nav button{padding:9px 12px;font-size:13px;white-space:nowrap;}
    .sidebar-foot{display:none;}
    #btn-logout{flex:0 0 auto;margin-top:0 !important;white-space:nowrap;}
    main{padding:18px 14px 60px;}
    .page-head{align-items:flex-start;}
    .page-head h1{font-size:20px;}
    .kpi-row{grid-template-columns:repeat(2,1fr);gap:10px;}
    .kpi{padding:13px 14px;}
    .kpi .val{font-size:21px;}
    .grid-2{gap:14px;}
    .card{padding:16px;overflow-x:auto;}
    table{font-size:12.5px;}
    th,td{padding:9px 8px;}
    .form-grid{grid-template-columns:1fr;}
    .weight-grid{grid-template-columns:1fr 1fr;}
    .stat-mini{grid-template-columns:repeat(2,1fr);}
    input[type=text],input[type=number],input[type=date],input[type=password],select,textarea,.btn{min-height:40px;}
    .btn{padding:10px 16px;}
    .btn-sm{min-height:34px;padding:7px 12px;}
    .profile-head{align-items:flex-start;}
    .inline-form{padding:14px;}
  }
  @media(max-width:480px){
    .kpi-row{grid-template-columns:1fr 1fr;}
    .stat-mini{grid-template-columns:1fr 1fr;}
    .weight-grid{grid-template-columns:1fr;}
    main{padding:14px 10px 60px;}
    .card{padding:14px;}
  }
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface-3);border:1px solid var(--border);padding:11px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:.25s;max-width:92vw;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
</style>
</head>

function computeAuditScores(checkpoints){
  let passed=0, total=0;
  const catScores = {};
  D3_CHECKLIST.forEach(cat=>{
    let p=0,t=0;
    cat.items.forEach(it=>{
      const v = checkpoints[it.code];
      if(v==='pass'){p++;t++;passed++;total++;}
      else if(v==='fail'){t++;total++;}
    });
    catScores[cat.key] = t? Math.round((p/t)*100) : null;
  });
  const overallPct = total? Math.round((passed/total)*100) : 0;
  return {catScores, overallPct};
}
function tier1Failures(checkpoints){
  const fails=[];
  D3_CHECKLIST.forEach(cat=>cat.items.forEach(it=>{ if(it.tier===1 && checkpoints[it.code]==='fail') fails.push(it.code); }));
  return fails;
}

function computeTriggers(){
  const triggers = [];
  state.qualityReviews.forEach(r=>{

      triggers.push({code:'Q1', severity:'IMMEDIATE', text:`Transfer Design hard stop — ${employeeById(r.employeeId)?.name||'—'} — "${r.program}" (${fmtDate(r.date)})`});
    }
  });
  state.employees.forEach(e=>{
    const revs = state.qualityReviews.filter(r=>r.employeeId===e.id).sort((a,b)=>new Date(a.date)-new Date(b.date));
    for(let i=0;i+2<revs.length;i++){
      const win = revs.slice(i,i+3);
      const avg = win.reduce((s,r)=>s+r.pct,0)/3;
      if(avg<80){
        triggers.push({code:'Q2', severity:'URGENT', text:`${e.name} — average quality score below 80% across 3 consecutive reviews (${avg.toFixed(0)}%)`});
        break;
      }
    }
  });
  const latestAudit = state.complianceAudits.slice().sort((a,b)=> new Date(b.year,b.month)-new Date(a.year,a.month))[0];
  if(latestAudit){
    if(latestAudit.tier1Fails && latestAudit.tier1Fails.length){
      triggers.push({code:'O1', severity:'IMMEDIATE', text:`Tier 1 checkpoint failure this month: ${latestAudit.tier1Fails.join(', ')}`});
    }
    if(typeof latestAudit.overallPct==='number' && latestAudit.overallPct<90){
      triggers.push({code:'O2', severity:'URGENT', text:`Monthly compliance score is ${latestAudit.overallPct}% — below the 90% standard`});
    }
  }
  state.employees.forEach(e=>{
    if(e.tierStartDate){
      const months = monthsBetween(e.tierStartDate, todayStr());

  });
  return triggers;
}

function addDays(dateStr, n){ const [y,m,d]=dateStr.split('-').map(Number); const dt=new Date(Date.UTC(y,m-1,d)); dt.setUTCDate(dt.getUTCDate()+n); return dt.toISOString().slice(0,10); }

// Work week is Sunday–Thursday; Friday and Saturday are the weekend and never count toward durations, deadlines, or leave balances.
function isWeekendDay(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const day = new Date(Date.UTC(y,m-1,d)).getUTCDay(); // 0=Sun ... 5=Fri, 6=Sat
  return day===5 || day===6;
}
function addBusinessDays(dateStr, n){
  if(!dateStr || !isFinite(n)) return dateStr;
  let d = dateStr;
  let remaining = Math.min(Math.abs(n), 3650);
  const step = n>=0 ? 1 : -1;
  let guard = 0;
  while(remaining>0 && guard<20000){
    d = addDays(d, step);
    if(!isWeekendDay(d)) remaining--;
    guard++;
  }
  return d;
}
function businessDayDiff(a, b){
  if(!a || !b) return 0;
  if(a===b) return 0;
  const sign = a>b ? 1 : -1;
  const lo = sign===1? b : a;
  const hi = sign===1? a : b;
  let count = 0, cur = lo, guard = 0;
  while(cur < hi && guard<20000){
    cur = addDays(cur, 1);
    if(!isWeekendDay(cur)) count++;
    guard++;
  }
  return count*sign;
}
function businessDaysInclusive(aStr, bStr){
  if(!aStr || !bStr) return 0;
  const lo = aStr<=bStr? aStr : bStr;
  const hi = aStr<=bStr? bStr : aStr;
  let count = 0, cur = lo, guard = 0;
  while(cur<=hi && guard<20000){
    if(!isWeekendDay(cur)) count++;
    cur = addDays(cur,1);
    guard++;
  }
  return count;
}

    byMonth[k] = (byMonth[k]||0) + (computeTaskHoursDiff(t)||0);
  });
  return Object.keys(byMonth).sort().map(k=>({key:k, label: monthLabelFromKey(k), netHours: Math.round(byMonth[k]*10)/10}));
}
function employeeMonitoringHours(empId, mKey){
  return state.monitoringLogs
    .filter(m=>m.employeeId===empId && (!mKey || monthKey(m.date)===mKey))
    .reduce((s,m)=>s+(Number(m.hours)||0), 0);
}
function employeeMonitoringHoursMonthlyHistory(empId){

  return Object.keys(byMonth).sort().map(k=>({key:k, label:monthLabelFromKey(k), hours:Math.round(byMonth[k]*10)/10}));

function computeHeroesScore(empId){
  const mKey = monthKey(todayStr());

  // 1. Commitment (25% total) — split evenly between Attendance discipline and Delivery-deadline reliability (Buffering/Shrinkage Time), both this month.
  // Attendance is unrelated to leave requests (Annual/Sick/approved Late/approved Leave Early) — it's built purely from unauthorized late-arrival / early-departure hours the Team Lead logs manually.
  const unauthorizedHours = state.attendanceLogs.filter(a=>a.employeeId===empId && a.month===mKey).reduce((s,a)=>s+(Number(a.hours)||0),0);
  const attendanceScore = Math.max(0, 100 - unauthorizedHours*10);
  const monthly = employeeMonthlyTime(empId).find(m=>m.key===mKey);
  const netHours = monthly? monthly.netHours : 0;
  const bufferingScore = Math.max(0, Math.min(100, 50 + netHours*2));
  const timeScore = Math.round((attendanceScore + bufferingScore) / 2);

  // 2a. Quality of work — Domain 1 reviews. This month's avg; falls back to all-time avg if nothing logged yet this month
  const reviewsThisMonth = state.qualityReviews.filter(r=>r.employeeId===empId && monthKey(r.date)===mKey);
  const allReviews = state.qualityReviews.filter(r=>r.employeeId===empId);
  const qualityScore = reviewsThisMonth.length? (reviewsThisMonth.reduce((s,r)=>s+r.pct,0)/reviewsThisMonth.length)
    : (allReviews.length? (allReviews.reduce((s,r)=>s+r.pct,0)/allReviews.length) : null);
  const hasQuality = qualityScore!=null;

  // 2b. Quality of work — Training Monitor hours, this month, normalized to 0-100 (4+ hours = full marks)
  const monitoringHrs = employeeMonitoringHours(empId, mKey);
  const monitorScore = Math.min(100, monitoringHrs*25);

  // 2c. Quality of work — Client Satisfaction, this employee's own logged scores (1-5 stars -> 0-100)
  const satisfactionThisMonth = state.clientSatisfaction.filter(c=>c.employeeId===empId && monthKey(c.date)===mKey);
  const allSatisfaction = state.clientSatisfaction.filter(c=>c.employeeId===empId);
  const satisfactionRaw = satisfactionThisMonth.length? (satisfactionThisMonth.reduce((s,c)=>s+c.score,0)/satisfactionThisMonth.length)
    : (allSatisfaction.length? (allSatisfaction.reduce((s,c)=>s+c.score,0)/allSatisfaction.length) : null);
  const satisfactionScore = satisfactionRaw!=null? (satisfactionRaw/5)*100 : 0;

  // 3. Team recognition — High Fives received this month (capped so a couple don't dominate the score)
  const highFives = employeeHighFivesThisMonth(empId);
  const recognitionScore = Math.min(100, highFives*30);

  // 4. Growth & contribution — Stretch assignments taken on (all-time) + Innovation: completed "New Methodology / Tool Pilot" work (all-time)
  const stretchCount = employeeStats(empId).stretchCount;
  const innovationCount = tasksFor(empId).filter(t=>t.status==='done' && t.typeId==='tt9').length;
  const growthScore = Math.min(100, stretchCount*10 + innovationCount*15);

  // Quality of Work is 65% total: Domain 1 (55) + Training Monitor (5) + Client Satisfaction (5).
  // If there's no Domain 1 data yet, its 55 redistributes proportionally across the other components so a brand-new member isn't unfairly zeroed out.
  const baseWeights = {time:0.25, monitor:0.05, satisfaction:0.05, recognition:0.05, growth:0.05};
  const baseSum = Object.values(baseWeights).reduce((s,v)=>s+v,0); // 0.45
  let weights;
  if(hasQuality){
    weights = {...baseWeights, quality:0.55};
  } else {
    const scaled = {};
    Object.keys(baseWeights).forEach(k=> scaled[k] = baseWeights[k] + (baseWeights[k]/baseSum)*0.55);
    weights = {...scaled, quality:0};
  }

  const total = Math.round(
    timeScore*weights.time +
    (hasQuality?qualityScore:0)*weights.quality +
    monitorScore*weights.monitor +
    satisfactionScore*weights.satisfaction +
    recognitionScore*weights.recognition +
    growthScore*weights.growth
  );

  // A single blended 0-100 "Quality of Work" figure — how much of that whole bucket they're earning, for a clean 4-element view
  const qualityBucketWeight = weights.quality + weights.monitor + weights.satisfaction;
  const qualityOfWorkScore = qualityBucketWeight>0
    ? Math.round((((hasQuality?qualityScore:0)*weights.quality) + (monitorScore*weights.monitor) + (satisfactionScore*weights.satisfaction)) / qualityBucketWeight)
    : 0;

  return {
    total, weights, hasQuality,
    qualityOfWorkScore,
    timeScore: Math.round(timeScore), unauthorizedHours, attendanceScore: Math.round(attendanceScore), bufferingScore: Math.round(bufferingScore), netHours,
    qualityScore: hasQuality? Math.round(qualityScore) : null,
    monitorScore: Math.round(monitorScore), monitoringHrs,
    satisfactionScore: Math.round(satisfactionScore), satisfactionRaw: satisfactionRaw!=null?Math.round(satisfactionRaw*10)/10:null,
    recognitionScore: Math.round(recognitionScore), highFives,
    growthScore: Math.round(growthScore), stretchCount, innovationCount,
  };
}

const WEEKLY_CAPACITY_HOURS = 40; // standard working week assumption, used to translate queued work into a workload signal
function taskEstimatedHours(t){
  const type = typeById(t.typeId);
  if(!type) return 0;
  const mode = (t.mode && taskTypeMode(type, t.mode)) || type.modes[0];
  const days = (mode && mode.days!=null) ? mode.days : 0;
  return days * HOURS_PER_DAY;
}
function employeeWorkloadHours(empId){
  return tasksFor(empId).filter(t=>t.status==='open').reduce((s,t)=>s+taskEstimatedHours(t),0);
}
function employeeWorkloadWeeks(empId){
  return employeeWorkloadHours(empId)/WEEKLY_CAPACITY_HOURS;
}
function workloadStatus(weeks){
  if(weeks>2) return {label:'Overloaded', cls:'neg'};
  if(weeks>1) return {label:'Busy', cls:'zero'};
  return {label:'Comfortable', cls:'pos'};
}

function computeWeekBuckets(n){
  const start0 = getWeekStart(todayStr());
  const weeks = [];
  for(let i=0;i<n;i++){
    const start = addDays(start0, i*7);
    const end = addDays(start, 6);
    const d = new Date(start+'T00:00:00');
    weeks.push({start, end, label: (i===0?'This wk':d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}))});
  }
  return weeks;
}
function tasksInWeek(empId, weekStart, weekEnd){
  return tasksFor(empId).filter(t=>t.status==='open' && t.deadline>=weekStart && t.deadline<=weekEnd);
}
function employeeLeaveHoursInWeek(empId, weekStart, weekEnd){
  const approved = state.requests.filter(r=>r.employeeId===empId && r.status==='approved');
  let hours = 0;
  approved.forEach(r=>{
    if(r.type==='annual_leave' || r.type==='sick'){
      const rStart = r.startDate, rEnd = r.endDate || r.startDate;
      const s = rStart > weekStart ? rStart : weekStart;
      const e = rEnd < weekEnd ? rEnd : weekEnd;
      if(s<=e) hours += businessDaysInclusive(s,e) * HOURS_PER_DAY;
    } else if(r.type==='leave_early' || r.type==='late'){
      if(r.startDate>=weekStart && r.startDate<=weekEnd) hours += Number(r.hours)||1;
    } else if(r.type==='worked_day_off'){
      // the compDate is the day off taken in exchange — reduces capacity that week
      if(r.compDate && r.compDate>=weekStart && r.compDate<=weekEnd) hours += HOURS_PER_DAY;
      // the startDate is the original day off they actually worked — adds capacity that week
      if(r.startDate>=weekStart && r.startDate<=weekEnd) hours -= HOURS_PER_DAY;
    }
  });
  return hours;
}
function employeeLeaveDaysInWeek(empId, weekStart, weekEnd){
  return employeeLeaveHoursInWeek(empId, weekStart, weekEnd) / HOURS_PER_DAY;
}
function employeeWeekCapacityHours(empId, weekStart, weekEnd){
  return Math.max(0, WEEKLY_CAPACITY_HOURS - employeeLeaveHoursInWeek(empId, weekStart, weekEnd));
}

}

}

function employeeStats(empId){

function authEmailFor(username){ return username.trim().toLowerCase()+'@skillsbank.local'; }
async function createAuthAccount(username, password, role, employeeId){
  const email = authEmailFor(username);
  const { data, error } = await sbClient.auth.signUp({ email, password });
  if(error || !data.user) return {ok:false, error};
  const { error: profErr } = await sbClient.from('profiles').insert({ id:data.user.id, role, employee_id: employeeId||null, username });
  if(profErr) return {ok:false, error:profErr};
  return {ok:true};
}
async function migrateToSecureLogin(){
  if(state.authMigrated){ showToast('Already migrated'); return; }
  if(!confirm('Before continuing: in your Supabase project, go to Authentication > Providers > Email and turn OFF "Confirm email". Have you done that? Click OK to proceed, or Cancel to check first.')) return;
  const accountsToMigrate = [
    {username: state.accounts.admin.username, password: state.accounts.admin.password, role:'admin'},
    {username: state.accounts.teamlead.username, password: state.accounts.teamlead.password, role:'teamlead'},
    ...state.employees.filter(e=>e.username && e.password).map(e=>({username:e.username, password:e.password, role:'employee', employeeId:e.id})),
  ];
  let okCount=0, failCount=0;
  for(const acc of accountsToMigrate){
    const res = await createAuthAccount(acc.username, acc.password, acc.role, acc.employeeId);
    if(res.ok) okCount++; else { failCount++; console.error('Migration failed for', acc.username, res.error); }
  }
  if(okCount>0){
    state.authMigrated = true;
    logActivity(`Migrated ${okCount} account(s) to secure login${failCount?`, ${failCount} failed — see console`:''}`);
    await saveData();
  }
  try{ await sbClient.auth.signOut(); }catch(e){}
  showToast(`Migration finished — ${okCount} succeeded, ${failCount} failed. Please log back in.`);
  await clearSession();
}
function checkLoginLegacy(username, password){
  const acc = state.accounts;
  if(username===acc.admin.username && password===acc.admin.password) return {role:'admin'};
  if(username===acc.teamlead.username && password===acc.teamlead.password) return {role:'teamlead'};
  const emp = state.employees.find(e=>e.username && e.username===username && e.password===password);
  if(emp) return {role:'employee', employeeId:emp.id};
  return null;
}
async function checkLoginSecure(username, password){
  const email = authEmailFor(username);
  const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
  if(error || !data || !data.user) return null;
  const { data: profile } = await sbClient.from('profiles').select('*').eq('id', data.user.id).single();
  if(!profile) return null;
  return profile.role==='employee' ? {role:'employee', employeeId:profile.employee_id} : {role:profile.role};
}
async function checkLogin(username, password){
  if(!username || !password) return null;
  const secure = await checkLoginSecure(username, password);
  if(secure) return secure;
  return checkLoginLegacy(username, password);
}

function bindLoginEvents(){
  const doLogin = async ()=>{
    loginState.error='';

    if(result){

      await saveSession();
      await loadData();
      renderApp();

function refreshApprovalsBadge(){
  const badge = document.getElementById('nav-approvals-badge');
  if(!badge) return;
  const pendingCount = state.tasks.filter(t=>t.status==='pending_approval').length + state.requests.filter(r=>r.status==='pending').length + state.voiceMessages.filter(v=>v.status!=='read').length;
  badge.textContent = pendingCount || '';
  badge.style.display = pendingCount? '' : 'none';
}
function render(){
  if(!session) return;
  if(session.role==='employee'){
    if(!['dashboard','myprofile','charter','dailywork'].includes(ui.page)) ui.page='dashboard';
    document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===ui.page));
    refreshApprovalsBadge();
    const main = document.getElementById('app-main');
    if(ui.page==='dashboard') main.innerHTML = renderDashboard(true);
    else if(ui.page==='charter') main.innerHTML = renderCharter();
    else if(ui.page==='dailywork') main.innerHTML = renderDailyWork();
    else main.innerHTML = renderEmployeeProfile(session.employeeId);
    bindEvents();
    return;
  }
  const allowed = NAV_ITEMS.filter(n=>n.roles.includes(session.role)).map(n=>n.page);
  if(!allowed.includes(ui.page)) ui.page = 'dashboard';
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===ui.page));
  refreshApprovalsBadge();
  const main = document.getElementById('app-main');
  if(ui.page==='dashboard') main.innerHTML = renderDashboard(false);
  else if(ui.page==='weekly') main.innerHTML = renderWeeklyPrep();
  else if(ui.page==='tasks') main.innerHTML = renderTasks();
  else if(ui.page==='approvals') main.innerHTML = renderApprovals();
  else if(ui.page==='team') main.innerHTML = ui.selectedEmployee ? renderEmployeeProfile(ui.selectedEmployee) : renderTeam();
  else if(ui.page==='quality') main.innerHTML = renderQuality();
  else if(ui.page==='reports') main.innerHTML = renderReports();
  else if(ui.page==='dailywork') main.innerHTML = renderDailyWork();
  else if(ui.page==='charter') main.innerHTML = renderCharter();
  else if(ui.page==='settings') main.innerHTML = renderSettings();
  bindEvents();
}

function hashString(s){
  let h=0; for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  return h;
}
function dayOfYear(){
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}
function getDailyQuote(seedKey){
  const idx = (dayOfYear() + hashString(seedKey||'')) % DAILY_QUOTES.length;
  return DAILY_QUOTES[idx];
}
function currentDisplayName(){
  if(!session) return '';
  if(session.role==='employee'){
    const e = employeeById(session.employeeId);
    return e? e.name.split(' ')[0] : 'there';
  }
  const username = session.role==='admin'? state.accounts.admin.username : state.accounts.teamlead.username;
  const name = username || 'there';
  return name.charAt(0).toUpperCase()+name.slice(1);
}
function renderGreetingBanner(){
  const name = currentDisplayName();
  const seed = session.role==='employee'? session.employeeId : session.role;
  const quote = getDailyQuote(seed);
  return `<div class="pulse-wrap" style="padding:20px 24px">
    <div style="font-family:'Cairo',sans-serif;font-weight:800;font-size:19px;margin-bottom:4px">Hello, ${escapeHtml(name)} 👋</div>
    <div style="color:var(--text-dim);font-size:13.5px">${escapeHtml(quote)}</div>
  </div>`;
}

function renderTriggersCard(teamWideOnly){
  let triggers = computeTriggers();
  if(teamWideOnly) triggers = triggers.filter(t=>t.code==='O1'||t.code==='O2');
  if(!triggers.length){
    return `<div class="card accent-rose"><h3>Active triggers</h3><div class="empty-state" style="padding:14px 0"><div class="t">No active triggers</div><div class="d">Nothing currently needs escalation, based on the LDU Trigger &amp; Escalation Protocol.</div></div></div>`;
  }
  const order = {IMMEDIATE:0,URGENT:1,STANDARD:2,SCHEDULED:3};
  triggers.sort((a,b)=>order[a.severity]-order[b.severity]);
  const colorFor = s=> s==='IMMEDIATE'?'rose':s==='URGENT'?'amber':s==='STANDARD'?'indigo':'teal';
  return `<div class="card accent-rose">
    <h3>Active triggers (${triggers.length})</h3>
    <p class="hint">Auto-detected from your logged data, based on the LDU Trigger &amp; Escalation Protocol.</p>
    ${triggers.map(t=>{
      const color = colorFor(t.severity);
      return `<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(37,48,83,.5)">
        <span class="badge" style="background:var(--${color}-dim);color:var(--${color});flex:0 0 auto;white-space:nowrap">${t.severity}</span>
        <div style="font-size:13.5px;color:var(--text)">${escapeHtml(t.text)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderDashboard(isEmployeeView){
  const ranking = teamRanking();
  const totalTasks = state.tasks.length;
  const openTasks = state.tasks.filter(t=>t.status==='open').length;
  const doneTasks = state.tasks.filter(t=>t.status==='done');
  const onTimeAll = doneTasks.filter(t=>computeTaskHoursDiff(t)>=0).length;
  const onTimeRateAll = doneTasks.length? Math.round((onTimeAll/doneTasks.length)*100) : null;
  const teamMonthNet = ranking.reduce((s,r)=>s+r.stats.currentMonthNet,0);
  const teamQuality = state.qualityReviews.length? Math.round(state.qualityReviews.reduce((s,r)=>s+r.pct,0)/state.qualityReviews.length) : null;
  const latestAudit = state.complianceAudits.slice().sort((a,b)=>new Date(b.year,b.month)-new Date(a.year,a.month))[0];

  const recentHours = doneTasks
    .slice().sort((a,b)=> new Date(a.completedDate)-new Date(b.completedDate))
    .slice(-24).map(t=>computeTaskHoursDiff(t));
  const maxAbs = Math.max(1, ...recentHours.map(v=>Math.abs(v)));

  const openTasksArr = state.tasks.filter(t=>t.status==='open');
  const pendingApprovalCount = state.tasks.filter(t=>t.status==='pending_approval').length;

    {label:'Completed', value:doneTasks.length, color:'var(--teal)'},
    {label:'Pending approval', value:pendingApprovalCount, color:'var(--indigo)'},
    {label:'On track', value:openOnTrackCount, color:'var(--amber)'},
    {label:'Overdue', value:openOverdueCount, color:'var(--rose)'},
  ];
  const onTimeSegments = [
    {label:'On-time', value:onTimeAll, color:'var(--teal)'},
    {label:'Late', value: doneTasks.length-onTimeAll, color:'var(--rose)'},

      <div class="kpi"><div class="lbl">Avg quality score</div><div class="val">${teamQuality===null?'—':teamQuality+'<small>%</small>'}</div></div>

      <div class="card accent-indigo">
        <h3>Task status</h3>
        <p class="hint">Where everything stands right now</p>

function renderTasks(){

    <div class="card accent-teal">
      <h3>Completed task log (${done.length})</h3>

        <tbody>
          ${state.taskTypes.map(tt=>`<tr>
            <td>${escapeHtml(tt.name)}</td>
            <td style="color:var(--text-dim);font-size:12.5px">${tt.modes.map(m=>`${escapeHtml(m.label)}: ${escapeHtml(m.range)}`).join('<br>')}</td>
            <td style="color:var(--text-dim)">${tt.lead?escapeHtml(tt.lead):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

}

function taskModeLabel(t){
  const type = typeById(t.typeId);
  if(!type || !t.mode) return '';
  const mode = type.modes.find(m=>m.key===t.mode);
  return mode? mode.label : '';
}
function taskMeta(t){
  const bits = [];
  if(t.client) bits.push('Client: '+escapeHtml(t.client));
  if(t.bdUnit) bits.push('BD: '+escapeHtml(t.bdUnit));
  if(t.language) bits.push('Language: '+escapeHtml(t.language));
  if(t.topicType) bits.push('Topic: '+escapeHtml(t.topicType));
  const line1 = bits.length? `<div style="font-size:11.5px;color:var(--text-faint);margin-top:2px">${bits.join(' · ')}</div>` : '';
  const line2 = t.summary? `<div style="font-size:11.5px;color:var(--text-faint);margin-top:2px">${escapeHtml(t.summary)}</div>` : '';
  return line1+line2;
}

            <div style="padding:12px;background:var(--surface-2);border-radius:10px">

}

      </div>

        <table style="margin-top:16px">
          <thead><tr><th>Month</th><th>Member</th><th>Hours</th><th>Note</th><th></th></tr></thead>
          <tbody>
            ${state.attendanceLogs.slice().sort((a,b)=>b.month.localeCompare(a.month)).map(a=>`<tr>
              <td>${monthLabelFromKey(a.month)}</td>
              <td>${escapeHtml(employeeById(a.employeeId)?.name||'—')}</td>

            </tr>`).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state" style="padding-top:20px">Nothing logged yet.</div>`}
    </div>

    <div class="card accent-teal">
      <h3>Leave &amp; capacity this week</h3>
      <p class="hint">Every approved leave, sickness, late/early, or comp day currently reducing the team's available hours — so nothing catches you off guard.</p>
      ${(()=>{
        const w = computeWeekBuckets(1)[0];
        const onLeave = state.employees.map(e=>({e, hrs: employeeLeaveHoursInWeek(e.id, w.start, w.end)})).filter(x=>x.hrs>0);
        const teamCapacity = state.employees.reduce((s,e)=>s+WEEKLY_CAPACITY_HOURS,0);
        const teamLost = onLeave.reduce((s,x)=>s+x.hrs,0);
        const pctLost = teamCapacity>0? Math.round((teamLost/teamCapacity)*100) : 0;
        return `
          <p style="font-size:13.5px;margin:0 0 14px">
            ${onLeave.length? `<b>${onLeave.length}</b> team member${onLeave.length===1?'':'s'} affected this week — team capacity reduced by <b>${pctLost}%</b> (${Math.round(teamLost*10)/10}h of ${teamCapacity}h).`
              : 'No approved leave, sickness, or late/early affecting this week — full team capacity available.'}
          </p>
          ${onLeave.length? `
            <table>
              <thead><tr><th>Member</th><th>Hours affected this week</th></tr></thead>
              <tbody>
                ${onLeave.map(x=>`<tr>
                  <td><div class="who">${avatarHTML(x.e)}<div class="nm">${escapeHtml(x.e.name)}</div></div></td>
                  <td><span class="tag">🏖 ${Math.round(x.hrs*10)/10}h</span></td>
                </tr>`).join('')}
              </tbody>
            </table>
          ` : ''}
        `;
      })()}
    </div>

    <div class="card accent-rose">
      <h3>Workload heat map — estimated hours</h3>
      <p class="hint">Estimated hours of open work due each week, per member — the darker the cell, the closer that member is to (or past) their capacity for that week. 🏖 marks a week with approved leave, where capacity is automatically reduced.</p>
      ${renderWorkloadHeatmap(6, (empId,w)=>{
        const hrs = tasksInWeek(empId,w.start,w.end).reduce((s,t)=>s+taskEstimatedHours(t),0);
        return Math.round(hrs*10)/10;
      }, {suffix:'h', leaveAware:true})}
    </div>

    <div class="card accent-amber">
      <h3>Workload vs. capacity</h3>
      <p class="hint">Estimated hours of open work per member, against a standard ${WEEKLY_CAPACITY_HOURS}h working week — for planning who can take on more, and who can't.</p>
      ${state.employees.length? `
        <table>
          <thead><tr><th>Member</th><th>Open tasks</th><th>Est. hours queued</th><th>Weeks of backlog</th><th>Status</th></tr></thead>
          <tbody>
            ${state.employees.map(e=>{
              const openCount = tasksFor(e.id).filter(t=>t.status==='open').length;
              const hrs = employeeWorkloadHours(e.id);
              const weeks = employeeWorkloadWeeks(e.id);
              const status = workloadStatus(weeks);
              return `<tr>
                <td><div class="who">${avatarHTML(e)}<div class="nm">${escapeHtml(e.name)}</div></div></td>
                <td>${openCount}</td>
                <td>${Math.round(hrs*10)/10}h</td>
                <td>${weeks.toFixed(1)}</td>
                <td><span class="badge ${status.cls}">${status.label}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : emptyState('◍','No team members yet','Add your first team member above.')}
    </div>
  `;
}

  const monthsInTier = e.tierStartDate ? monthsBetween(e.tierStartDate, todayStr()) : null;

    <div class="stat-mini">

      <div class="box"><div class="l">This month</div><div class="v" style="font-size:15px;color:${s.currentMonthNet>0?'var(--teal)':s.currentMonthNet<0?'var(--rose)':'var(--text)'}">${s.currentMonthNet>0?'+':''}${fmtHours(s.currentMonthNet)} ${s.currentMonthNet>0?'Buffer':s.currentMonthNet<0?'Shrinkage':''}</div></div>

      <div class="box"><div class="l">Stretch assignments</div><div class="v">${s.stretchCount}</div></div>
      <div class="box"><div class="l">Innovation contributions</div><div class="v">${tasksFor(e.id).filter(t=>t.status==='done' && t.typeId==='tt9').length}</div></div>

            ${s.reviews.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>`<tr>
              <td>${fmtDate(r.date)}</td>
              <td>${escapeHtml(r.program)}</td>
              <td><span class="tag">${escapeHtml(typeById(r.typeId)?.name||'—')}</span></td>
              <td><span class="badge ${ratingBadgeClass(r.pct,91,80)}">${r.pct}% · ${ratingForPct(r.pct)}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : emptyState('✓','No quality reviews logged yet','Log a deliverable review for this member from the Quality & Compliance page.')}

    <div class="card accent-amber">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:${ui.showAddCheckin?'16px':'0'}">
        <div><h3 style="margin:0">Monthly check-ins</h3><p class="hint" style="margin:2px 0 0">Light monthly touchpoint — no formal score, just a note.${isSelfService?' Logged by your Team Lead.':''}</p></div>
        ${isSelfService? '' : `<button class="btn btn-ghost btn-sm" id="btn-add-checkin">${ui.showAddCheckin?'Close form':'+ Log a check-in'}</button>`}

      ${(!isSelfService && ui.showAddCheckin)? addCheckinForm() : ''}

          </tbody>
        </table>
      ` : `<div class="empty-state" style="padding-top:16px">No check-ins logged yet.</div>`}

      ${oneOnOnes.length? oneOnOnes.map(o=>`

function requestDatesText(r){
  if(r.type==='leave_early' || r.type==='late') return `${fmtDate(r.startDate)}${r.time?' at '+r.time:''}`;
  if(r.type==='worked_day_off') return `Worked ${fmtDate(r.startDate)} → comp day ${fmtDate(r.compDate)}`;
  if(r.endDate && r.endDate!==r.startDate){
    const days = requestDayCount(r);
    return `${fmtDate(r.startDate)} → ${fmtDate(r.endDate)} (${days}d)${days>60?' <span style="color:var(--rose);font-weight:700">⚠ looks wrong — delete?</span>':''}`;
  }
  return fmtDate(r.startDate);
}

/* ============ WEEKLY PREP ============ */
function renderWeeklyPrep(){
  const openTasks = state.tasks.filter(t=>t.status==='open');
  const today = todayStr();
  const pulse = openTasks.map(t=>{
    const daysLeft = businessDayDiff(t.deadline, today);
    let status, cls;
    if(daysLeft<0){ status='Overdue by '+Math.abs(daysLeft)+'d'; cls='neg'; }
    else if(daysLeft<=2){ status='Due soon ('+daysLeft+'d left)'; cls='zero'; }
    else { status='On track ('+daysLeft+'d left)'; cls='pos'; }
    return {t, status, cls, daysLeft};
  }).sort((a,b)=>a.daysLeft-b.daysLeft);

  const triggers = computeTriggers();
  const flags = triggers.filter(t=>t.severity==='IMMEDIATE'||t.severity==='URGENT');
  const decisions = triggers.filter(t=>t.severity==='STANDARD'||t.severity==='SCHEDULED');

  const weekStart = getWeekStart(today);
  const weekCommitments = state.commitments.filter(c=>c.weekStart===weekStart);

  return `
    <div class="page-head">
      <div><h1>Weekly Meeting Prep</h1><p>Auto-built agenda for the standing 45-minute weekly team meeting — delivery pulse, flags, decisions, and commitments.</p></div>
    </div>

    <div class="card accent-indigo">
      <h3>Delivery pulse</h3>
      <p class="hint">One line per active project — pulled straight from the Tasks page.</p>
      ${pulse.length? `
        <table>
          <thead><tr><th>Task</th><th>Assignee</th><th>Status</th></tr></thead>
          <tbody>
            ${pulse.map(p=>`<tr>
              <td>${escapeHtml(p.t.title)}</td>
              <td>${escapeHtml(employeeById(p.t.assigneeId)?.name||'—')}</td>
              <td><span class="badge ${p.cls}">${p.status}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : emptyState('▤','No active projects','Nothing open right now.')}
    </div>

    <div class="card accent-rose">
      <h3>Flags &amp; risks</h3>
      <p class="hint">Anything that needs visibility or a decision this week.</p>
      ${flags.length? flags.map(f=>`<div style="padding:8px 0;border-bottom:1px solid rgba(37,48,83,.5);font-size:13.5px">
        <span class="badge ${f.severity==='IMMEDIATE'?'neg':'zero'}" style="margin-right:8px">${f.severity}</span>${escapeHtml(f.text)}
      </div>`).join('') : `<div class="empty-state" style="padding:14px 0"><div class="t">No flags this week</div></div>`}
    </div>

    <div class="card accent-amber">
      <h3>Decisions needed</h3>
      ${decisions.length? decisions.map(d=>`<div style="padding:8px 0;border-bottom:1px solid rgba(37,48,83,.5);font-size:13.5px">
        <span class="badge zero" style="margin-right:8px">${d.severity}</span>${escapeHtml(d.text)}
      </div>`).join('') : `<div class="empty-state" style="padding:14px 0"><div class="t">Nothing pending a decision</div></div>`}
    </div>

    <div class="card accent-teal">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:${ui.showAddCommitment?'16px':'0'}">
        <div><h3 style="margin:0">This week's commitments</h3><p class="hint" style="margin:2px 0 0">Week of ${fmtDate(weekStart)} — one specific thing per person before next meeting.</p></div>
        <button class="btn btn-ghost btn-sm" id="btn-add-commitment">${ui.showAddCommitment?'Close form':'+ Add commitment'}</button>
      </div>
      ${ui.showAddCommitment? addCommitmentForm() : ''}
      ${weekCommitments.length? `
        <table style="margin-top:16px">
          <thead><tr><th></th><th>Member</th><th>Commitment</th></tr></thead>
          <tbody>
            ${weekCommitments.map(c=>`<tr>
              <td><input type="checkbox" data-toggle-commitment="${c.id}" ${c.done?'checked':''}></td>
              <td>${escapeHtml(employeeById(c.employeeId)?.name||'—')}</td>
              <td style="${c.done?'text-decoration:line-through;color:var(--text-faint)':''}">${escapeHtml(c.text)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state" style="padding-top:16px">No commitments logged for this week yet.</div>`}
    </div>
  `;
}
function addCommitmentForm(){
  if(!state.employees.length) return `<div class="inline-form">Add a team member first.</div>`;
  return `

      <div><label>Member</label><select id="cm-emp">${state.employees.map(e=>`<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('')}</select></div>

/* ============ REPORTS ============ */
function renderReports(){
  const filteredTasks = state.tasks.filter(t=>{
    if(ui.reportFilterEmp!=='all' && t.assigneeId!==ui.reportFilterEmp) return false;
    if(ui.reportFilterType!=='all' && t.typeId!==ui.reportFilterType) return false;
    if(ui.reportFilterStatus!=='all' && t.status!==ui.reportFilterStatus) return false;
    return true;
  });
  const done = filteredTasks.filter(t=>t.status==='done');
  const onTime = done.filter(t=>computeTaskHoursDiff(t)>=0).length;
  const onTimeRate = done.length? Math.round((onTime/done.length)*100) : null;
  const avgDelta = done.length? (done.reduce((s,t)=>s+businessDayDiff(t.deadline,t.completedDate),0)/done.length).toFixed(1) : '—';

  const ranking = teamRanking();
  const maxTimeAbs = Math.max(1, ...ranking.map(r=>Math.abs(r.stats.currentMonthNet)));

  const typeCounts = state.taskTypes.map(tt=>({type:tt, count: state.tasks.filter(t=>t.typeId===tt.id).length}))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxTypeCount = Math.max(1, ...typeCounts.map(x=>x.count));

  const lateTasks = done.filter(t=>computeTaskHoursDiff(t)<0).sort((a,b)=>computeTaskHoursDiff(a)-computeTaskHoursDiff(b)).slice(0,5);

  const qualityByEmp = state.employees.map(e=>({emp:e, avg:employeeStats(e.id).qualityAvg})).filter(x=>x.avg!==null);
  const maxQuality = 100;

  const typeSegments = typeCounts.map((x,i)=>({label:x.type.name, value:x.count, color:AVATAR_COLORS[i%AVATAR_COLORS.length]}));

  const RATING_ORDER = ['Exceeds Standard','Meets Standard','Developing','Below Standard','Fundamental Concern'];
  const RATING_COLORS = {'Exceeds Standard':'#40BDA9','Meets Standard':'#4D88E8','Developing':'#FFBC3A','Below Standard':'#F26A44','Fundamental Concern':'#B23A2E'};
  const ratingBuckets = {}; RATING_ORDER.forEach(r=>ratingBuckets[r]=0);
  state.qualityReviews.forEach(r=>{ ratingBuckets[ratingForPct(r.pct)]++; });
  const ratingSegments = RATING_ORDER.map(r=>({label:r, value:ratingBuckets[r], color:RATING_COLORS[r]}));

  const qualityByMonth = {};
  state.qualityReviews.forEach(r=>{ const k=monthKey(r.date); (qualityByMonth[k]=qualityByMonth[k]||[]).push(r.pct); });
  const qualityTrendPoints = Object.keys(qualityByMonth).sort().map(k=>{
    const [y,mo]=k.split('-').map(Number);
    return {label:MONTH_NAMES[mo]+" '"+String(y).slice(2), value: Math.round(qualityByMonth[k].reduce((s,v)=>s+v,0)/qualityByMonth[k].length)};
  });

  const complianceTrendPoints = state.complianceAudits.slice()
    .sort((a,b)=> new Date(a.year,a.month)-new Date(b.year,b.month))
    .map(a=>({label:MONTH_NAMES[a.month]+" '"+String(a.year).slice(2), value:a.overallPct}));

  const timeBars = ranking.map(r=>({label:r.emp.name.split(' ')[0], value:r.stats.currentMonthNet, color: r.stats.currentMonthNet>0?'var(--teal)':r.stats.currentMonthNet<0?'var(--rose)':'var(--text-faint)'}));
  const qualityBars = qualityByEmp.map(x=>({label:x.emp.name.split(' ')[0], value:x.avg, color: x.avg>=80?'var(--teal)':x.avg>=65?'var(--amber)':'var(--rose)'}));

  return `
    <div class="page-head">
      <div><h1>Reports &amp; Analysis</h1><p>A full view of team and task performance over time.</p></div>
    </div>

    <div class="filters">
      <select id="rf-emp"><option value="all">All members</option>${state.employees.map(e=>`<option value="${e.id}" ${ui.reportFilterEmp===e.id?'selected':''}>${escapeHtml(e.name)}</option>`).join('')}</select>
      <select id="rf-type"><option value="all">All types</option>${state.taskTypes.map(t=>`<option value="${t.id}" ${ui.reportFilterType===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}</select>
      <select id="rf-status"><option value="all">All statuses</option><option value="open" ${ui.reportFilterStatus==='open'?'selected':''}>Open</option><option value="done" ${ui.reportFilterStatus==='done'?'selected':''}>Completed</option></select>
    </div>

    <div class="kpi-row">
      <div class="kpi indigo"><div class="lbl">Tasks matching filter</div><div class="val">${filteredTasks.length}</div></div>
      <div class="kpi teal"><div class="lbl">On-time rate</div><div class="val">${onTimeRate===null?'—':onTimeRate+'<small>%</small>'}</div></div>
      <div class="kpi"><div class="lbl">Avg deviation from deadline</div><div class="val">${avgDelta}<small>days</small></div></div>
      <div class="kpi amber"><div class="lbl">Top performer (this month)</div><div class="val" style="font-size:16px">${ranking[0]?escapeHtml(ranking[0].emp.name):'—'}</div></div>
    </div>

    <div class="grid-2">
      <div class="card accent-teal">
        <h3>Time balance this month</h3>
        <p class="hint">Net Buffering (+) / Shrinkage (−) hours per member, current month</p>
        ${svgBarChart(timeBars,{emptyText:'Add team members and tasks first.'})}
      </div>

      <div class="card accent-indigo">
        <h3>Task distribution by type</h3>
        <p class="hint">Most frequent deliverable types</p>
        ${typeSegments.length? `
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
            ${svgDonut(typeSegments,{centerLabel:'tasks'})}
            ${donutLegend(typeSegments)}
          </div>
        ` : emptyState('▦','No tasks yet','Assign the first task from the Tasks page.')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card accent-teal">
        <h3>Quality rating distribution</h3>
        <p class="hint">All logged Domain 1 reviews, by rating band</p>
        ${state.qualityReviews.length? `
          <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
            ${svgDonut(ratingSegments,{centerLabel:'reviews'})}
            ${donutLegend(ratingSegments.filter(s=>s.value>0))}
          </div>
        ` : emptyState('✓','No quality reviews logged yet','Log reviews from the Quality & Compliance page.')}
      </div>
      <div class="card accent-teal">
        <h3>Quality score by member</h3>
        <p class="hint">Average Domain 1 quality score from logged reviews</p>
        ${svgBarChart(qualityBars,{emptyText:'Log reviews from the Quality & Compliance page.'})}
      </div>
    </div>

    <div class="grid-2">
      <div class="card accent-teal">
        <h3>Quality score trend</h3>
        <p class="hint">Team average quality score, by month</p>
        ${svgLineChart(qualityTrendPoints,{color:'var(--teal)',suffix:'%',yMin:0,yMax:100,emptyText:'Log reviews across a few months to see the trend.'})}
      </div>
      <div class="card accent-amber">
        <h3>Compliance score trend</h3>
        <p class="hint">Monthly Domain 3 audit score</p>
        ${svgLineChart(complianceTrendPoints,{color:'var(--indigo)',suffix:'%',yMin:0,yMax:100,emptyText:'Log a few monthly audits to see the trend.'})}
      </div>
    </div>

    <div class="card accent-rose">
      <h3>Top 5 most overdue completed tasks</h3>
      ${lateTasks.length? `
        <table>
          <thead><tr><th>Task</th><th>Assignee</th><th>Days late</th></tr></thead>
          <tbody>
            ${lateTasks.map(t=>{
              const rawDays = Math.abs(businessDayDiff(t.deadline, t.completedDate));
              return `<tr>
              <td>${escapeHtml(t.title)}</td>
              <td>${escapeHtml(employeeById(t.assigneeId)?.name||'—')}</td>
              <td><span class="badge neg">${rawDays} day${rawDays===1?'':'s'}</span></td>
            </tr>`;}).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state" style="padding:20px 0"><div class="t">No late deliveries recorded</div></div>`}
    </div>

    <div class="card accent-indigo">
      <h3>Full task log</h3>
      ${filteredTasks.length? `
        <table>
          <thead><tr><th>Task</th><th>Type</th><th>Assignee</th><th>Status</th><th>Deadline</th><th>Delivered</th><th>Result</th></tr></thead>
          <tbody>
            ${filteredTasks.slice().sort((a,b)=>new Date(b.assignedDate)-new Date(a.assignedDate)).map(t=>{
              const hrs = computeTaskHoursDiff(t);
              return `<tr>
                <td>${escapeHtml(t.title)}</td>
                <td><span class="tag">${escapeHtml(typeById(t.typeId)?.name||'—')}</span>${taskModeLabel(t)?` <span class="tag">${escapeHtml(taskModeLabel(t))}</span>`:''}</td>
                <td>${escapeHtml(employeeById(t.assigneeId)?.name||'—')}</td>
                <td><span class="status-pill ${t.status==='done'?'done':t.status==='pending_approval'?'pending':'open'}">${t.status==='done'?'Completed':t.status==='pending_approval'?'Pending approval':'In progress'}</span></td>
                <td>${fmtDate(t.deadline)}</td>
                <td>${t.status==='done'?fmtDate(t.completedDate):'—'}</td>
                <td>${hrs===null?'—':timeBalanceBadge(hrs)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : emptyState('▦','No results match the current filters','Try changing the filters above.')}
    </div>

    <div class="card accent-indigo">
      <h3>Data export</h3>
      <p class="hint">Download a backup or feed data into the official biannual scorecard / appraisal process.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="btn-export-json">Full backup (JSON)</button>
        <button class="btn btn-ghost btn-sm" id="btn-export-tasks-csv">Tasks (CSV)</button>
        <button class="btn btn-ghost btn-sm" id="btn-export-reviews-csv">Quality reviews (CSV)</button>
        <button class="btn btn-ghost btn-sm" id="btn-export-audits-csv">Compliance audits (CSV)</button>
      </div>
    </div>

    <div class="card accent-amber">
      <h3>Activity log</h3>
      <p class="hint">Who changed what, and when — the last 100 actions.</p>
      ${state.auditLog.length? `
        <table>
          <thead><tr><th>When</th><th>Who</th><th>Action</th></tr></thead>
          <tbody>
            ${state.auditLog.slice().reverse().slice(0,100).map(l=>`<tr>
              <td style="white-space:nowrap;color:var(--text-faint);font-size:12px">${fmtDateTime(l.ts)}</td>
              <td><span class="tag">${escapeHtml(l.actor)}</span></td>
              <td>${escapeHtml(l.text)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : emptyState('▦','No activity logged yet','Actions like assigning tasks, logging reviews, and marking deliveries will show up here.')}
    </div>
  `;
}

/* ---- export helpers ---- */
function downloadFile(filename, content, mime){
  try{
    const blob = new Blob([content], {type: mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    return true;
  }catch(e){ return false; }
}
function csvCell(v){

/* ---- chart helpers ---- */
function svgDonut(segments, opts){
  opts = opts||{};
  const size = opts.size||128, thickness = opts.thickness||16;
  const total = segments.reduce((s,x)=>s+x.value,0);
  const r = (size-thickness)/2;
  const c = 2*Math.PI*r;
  const cx=size/2, cy=size/2;
  let offset=0, circles='';
  if(total<=0){
    circles = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${thickness}"></circle>`;
  } else {
    segments.filter(s=>s.value>0).forEach(seg=>{
      const frac = seg.value/total;
      const len = frac*c;
      circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${thickness}" stroke-dasharray="${len.toFixed(2)} ${(c-len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
      offset += len;
    });
  }
  const centerVal = opts.centerValue!=null? opts.centerValue : total;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex:0 0 auto">
    ${circles}
    <text x="${cx}" y="${cy-1}" text-anchor="middle" font-family="Cairo, sans-serif" font-weight="800" font-size="${Math.round(size*0.19)}" fill="var(--text)">${centerVal}</text>
    ${opts.centerLabel? `<text x="${cx}" y="${cy+size*0.14}" text-anchor="middle" font-family="Inter, sans-serif" font-size="${Math.round(size*0.08)}" fill="var(--text-dim)">${escapeHtml(opts.centerLabel)}</text>` : ''}
  </svg>`;
}
function donutLegend(segments){
  const total = segments.reduce((s,x)=>s+x.value,0);
  return `<div style="display:flex;flex-direction:column;gap:7px;min-width:150px">
    ${segments.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px">
      <span style="width:10px;height:10px;border-radius:3px;background:${s.color};flex:0 0 auto"></span>
      <span style="color:var(--text-dim);flex:1">${escapeHtml(s.label)}</span>
      <span style="font-weight:700">${s.value}${total?` <span style="color:var(--text-faint);font-weight:500">(${Math.round(s.value/total*100)}%)</span>`:''}</span>
    </div>`).join('')}
  </div>`;
}
function svgLineChart(points, opts){
  opts = opts||{};
  const width=opts.width||520, height=opts.height||160, pad=30;
  const color = opts.color||'var(--indigo)';
  if(!points.length) return `<div class="empty-state" style="padding:20px 0"><div class="d">${escapeHtml(opts.emptyText||'Not enough data yet')}</div></div>`;
  const values = points.map(p=>p.value);
  let min = opts.yMin!=null? opts.yMin : Math.min(...values);
  let max = opts.yMax!=null? opts.yMax : Math.max(...values);
  if(min===max){ min-=5; max+=5; }
  const innerW = width-pad*2, innerH = height-pad*2;
  const stepX = points.length>1? innerW/(points.length-1) : 0;
  const xy = points.map((p,i)=>({
    x: pad + i*stepX,
    y: pad + innerH - ((p.value-min)/(max-min))*innerH,
    ...p
  }));
  const path = xy.map((p,i)=> (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
  const areaPath = path + ` L${xy[xy.length-1].x.toFixed(1)},${(pad+innerH).toFixed(1)} L${xy[0].x.toFixed(1)},${(pad+innerH).toFixed(1)} Z`;
  return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible">
    <line x1="${pad}" y1="${(pad+innerH).toFixed(1)}" x2="${width-pad}" y2="${(pad+innerH).toFixed(1)}" stroke="var(--border)" stroke-width="1"></line>
    <path d="${areaPath}" fill="${color}" opacity="0.12"></path>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"></path>
    ${xy.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${color}"></circle>
      <text x="${p.x.toFixed(1)}" y="${(p.y-10).toFixed(1)}" text-anchor="middle" font-size="11" font-family="Inter, sans-serif" fill="var(--text-dim)">${p.value}${opts.suffix||''}</text>
      <text x="${p.x.toFixed(1)}" y="${height-6}" text-anchor="middle" font-size="10.5" font-family="Inter, sans-serif" fill="var(--text-faint)">${escapeHtml(String(p.label))}</text>`).join('')}
  </svg>`;
}
function svgBarChart(bars, opts){
  opts = opts||{};
  const width=opts.width||560, height=opts.height||190, pad=30;
  if(!bars.length) return `<div class="empty-state" style="padding:20px 0"><div class="d">${escapeHtml(opts.emptyText||'Not enough data yet')}</div></div>`;
  const maxV = Math.max(1, ...bars.map(b=>Math.abs(b.value)));
  const innerW = width-pad*2, innerH = height-pad*2;
  const gap = innerW/bars.length;
  const bw = gap*0.55;
  const baseY = pad+innerH;
  return `<svg width="100%" viewBox="0 0 ${width} ${height}" style="overflow:visible">
    <line x1="${pad}" y1="${baseY}" x2="${width-pad}" y2="${baseY}" stroke="var(--border)" stroke-width="1"></line>
    ${bars.map((b,i)=>{
      const x = pad + i*gap + (gap-bw)/2;
      const h = (Math.abs(b.value)/maxV)*innerH;
      const y = baseY-h;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${b.color||'var(--indigo)'}"></rect>
        <text x="${(x+bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="700" font-family="Cairo, sans-serif" fill="var(--text)">${Number.isInteger(b.value)?b.value:(Math.round(b.value*10)/10)}</text>
        <text x="${(x+bw/2).toFixed(1)}" y="${height-8}" text-anchor="middle" font-size="10.5" font-family="Inter, sans-serif" fill="var(--text-faint)">${escapeHtml(String(b.label))}</text>`;
    }).join('')}
  </svg>`;
}
function monthKey(dateStr){ const d=new Date(dateStr+'T00:00:00'); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function readAndResizePhoto(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const size = 220;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(size/img.width, size/img.height);
        const w = img.width*scale, h = img.height*scale;
        ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
